<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
    <title>Moist Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 默认使用中文界面。设置页 iframe 会读取同一个语言状态。
        try { localStorage.setItem('studio_lang', 'zh'); } catch (e) {}
    </script>
    <script src="/static/i18n.js?v=20260520-i18n-trim"></script>
    <style>
        /* ── Self-hosted fonts (offline-ready, no online dependency) ──
           Same six WOFF2 files used by static/canvas.html. */
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/static/fonts/inter-400.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('/static/fonts/inter-500.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('/static/fonts/inter-600.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Noto Sans SC';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/static/fonts/noto-sans-sc-400.woff2') format('woff2');
            unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2E80-2EFF, U+31C0-31EF;
        }
        @font-face {
            font-family: 'Noto Sans SC';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('/static/fonts/noto-sans-sc-500.woff2') format('woff2');
            unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2E80-2EFF, U+31C0-31EF;
        }
        @font-face {
            font-family: 'Noto Sans SC';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('/static/fonts/noto-sans-sc-600.woff2') format('woff2');
            unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2E80-2EFF, U+31C0-31EF;
        }

        /* ── Lovable tokens (see docs/design-tokens.md) ──
           Cream floor → off-white surface → warm interaction layers → charcoal CTA. */
        :root {
            /* Aligned with docs/design-tokens.md latest Lovable scale. */
            --lv-bg: #fcfbf8;            /* lightest off-white — outermost page floor */
            --lv-canvas-bg: #f7f4ed;     /* canvas viewport floor (Canvas V2) */
            --lv-panel-bg: #f7f4ed;      /* same as default surface */
            --lv-surface: #f7f4ed;       /* default cards, popovers, framed surfaces */
            --lv-surface-subtle: #fcfbf8;/* recessed inner field carved back to floor */
            --lv-hover: #d8d6cf;         /* deepest interactive step — hover/pressed only */
            --lv-active-subtle: rgba(28, 28, 28, 0.08);
            --lv-selected: #eceae4;      /* committed selected/active state */
            --lv-text: #1c1c1c;
            --lv-text-body: rgba(28, 28, 28, 0.82);
            --lv-muted: #5f5f5d;
            --lv-faint: rgba(28, 28, 28, 0.40);
            --lv-border: #eceae4;
            --lv-border-strong: rgba(28, 28, 28, 0.24);
            --lv-border-interactive: rgba(28, 28, 28, 0.40);
            --lv-accent: #1c1c1c;
            --lv-on-dark: #fcfbf8;
            --lv-radius-sm: 6px;
            --lv-radius-md: 8px;
            --lv-radius-lg: 12px;
            --lv-radius-full: 9999px;
            --lv-shadow-inset:
                rgba(255, 255, 255, 0.20) 0 0.5px 0 0 inset,
                rgba(0, 0, 0, 0.20) 0 0 0 0.5px inset,
                rgba(0, 0, 0, 0.05) 0 1px 2px 0;
            --lv-font-sans: 'Inter', 'Noto Sans SC', 'Source Han Sans SC', 'Source Han Sans CN', 'PingFang SC', 'Microsoft YaHei', ui-sans-serif, system-ui, -apple-system, sans-serif;

            /* Legacy aliases used by the rest of this stylesheet. */
            --bg: var(--lv-bg);
            --stage-bg: var(--lv-bg);
            --text: var(--lv-text);
            --muted: var(--lv-muted);
            --border: var(--lv-border);
            --scrollbar: var(--lv-selected);
            --scrollbar-hover: var(--lv-border-interactive);
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
        }

        /* 极简滚动条 */
        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }
        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }
        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 5px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
        }
        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }
        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }
        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--lv-bg);
            color: var(--lv-text);
            font-family: var(--lv-font-sans);
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }

        .stage {
            position: fixed;
            inset: 0;
            background: var(--lv-bg);
            transition: background 0.3s;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 0.3s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 左下角悬浮控制簇 */
        .floating-controls {
            position: fixed;
            left: 18px;
            bottom: 18px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Floating control: Lovable "ghost outline" — off-white surface,
           warm hairline, no glassmorphism. Charcoal only when active. */
        .float-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--lv-radius-full);
            background: var(--lv-surface);
            border: 1px solid var(--lv-border);
            color: var(--lv-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            transition: background 0.15s var(--fluid-ease),
                        color 0.15s var(--fluid-ease),
                        border-color 0.15s var(--fluid-ease),
                        box-shadow 0.15s var(--fluid-ease);
        }

        .float-btn:hover {
            background: var(--lv-hover);
            border-color: var(--lv-border-interactive);
        }

        .float-btn:active {
            background: var(--lv-active-subtle);
        }

        .float-btn.active {
            background: var(--lv-accent);
            color: var(--lv-on-dark);
            border-color: var(--lv-accent);
            box-shadow: var(--lv-shadow-inset);
        }

        .float-btn.active:hover {
            background: var(--lv-accent);
            opacity: 0.9;
        }

        .float-btn svg { width: 16px; height: 16px; }

        /* Update-available dot on the API settings button */
        .float-btn { position: relative; }
        .update-badge {
            position: absolute;
            top: -2px; right: -2px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #e5484d;
            border: 2px solid var(--lv-surface);
            display: none;
        }
        .update-badge.show { display: block; }

        /* One-time "new version" banner (bottom-left, above the float controls) */
        .update-banner {
            position: fixed;
            left: 18px;
            bottom: 64px;
            z-index: 201;
            max-width: 320px;
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--lv-radius-sm, 10px);
            background: var(--lv-surface);
            border: 1px solid var(--lv-accent);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            font-size: 12.5px;
            color: var(--lv-text);
        }
        .update-banner.show { display: flex; }
        .update-banner b { font-weight: 650; }
        .update-banner .ub-go {
            cursor: pointer;
            border: 1px solid var(--lv-accent);
            background: var(--lv-accent);
            color: var(--lv-on-dark);
            border-radius: var(--lv-radius-sm, 8px);
            padding: 4px 10px;
            font-size: 12px;
            font-family: inherit;
        }
        .update-banner .ub-x {
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--lv-faint);
            font-size: 16px;
            line-height: 1;
            padding: 0 2px;
        }

    </style>
</head>

<body>
    <main class="stage">
            <iframe id="frame-canvas" src="/static/canvas.html?v=20260521-rename-canvas" class="active"></iframe>
        <iframe id="frame-api-settings" data-src="/static/api-settings.html?v=20260521-no-dark-mode"></iframe>
    </main>

    <div class="floating-controls">
        <button class="float-btn" onclick="toggleApiSettings()" id="api-toggle-btn" type="button" title="设置">
            <svg id="icon-api" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 7h3a5 5 0 0 1 0 10h-3"></path>
                <path d="M9 17H6A5 5 0 0 1 6 7h3"></path>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            <svg id="icon-back" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span id="update-badge" class="update-badge" title="发现新版本"></span>
        </button>
    </div>

    <!-- One-time new-version banner; links into the API settings page where the
         full changelog + 一键更新 lives. -->
    <div id="update-banner" class="update-banner">
        <span>发现新版本 <b id="update-banner-ver"></b></span>
        <button class="ub-go" type="button" onclick="goUpdate()">去更新</button>
        <button class="ub-x" type="button" title="忽略" onclick="dismissUpdateBanner()">×</button>
    </div>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);

        function showFrame(id) {
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const target = document.getElementById('frame-' + id);
            if (!target) return;
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            syncLanguageToFrame(target);
        }

        function toggleApiSettings() {
            const apiFrame = document.getElementById('frame-api-settings');
            const apiBtn = document.getElementById('api-toggle-btn');
            const iconApi = document.getElementById('icon-api');
            const iconBack = document.getElementById('icon-back');
            const isApiActive = apiFrame.classList.contains('active');
            if (isApiActive) {
                showFrame('canvas');
                apiBtn.classList.remove('active');
                apiBtn.title = '设置';
                iconApi.style.display = '';
                iconBack.style.display = 'none';
            } else {
                showFrame('api-settings');
                apiBtn.classList.add('active');
                apiBtn.title = '返回画布';
                iconApi.style.display = 'none';
                iconBack.style.display = '';
            }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                }
            };
        }

        // --- 主题：已移除夜间模式，始终使用浅色 ---

        // --- 语言（默认中文，无切换按钮） ---

        function syncLanguageToFrame(frame) {
            if (!window.StudioI18n) return;
            try {
                frame.contentWindow?.postMessage({ type: 'studio-lang', lang: window.StudioI18n.lang() }, '*');
            } catch (e) { }
        }

        function broadcastLanguage() {
            document.querySelectorAll('iframe').forEach(frame => {
                try {
                    frame.contentWindow?.postMessage({ type: 'studio-lang', lang: window.StudioI18n.lang() }, '*');
                } catch (e) { }
            });
        }

        // ── Passive "new version available" hint ────────────────────────────
        // Checks GitHub once per browser session (sessionStorage gate), then
        // shows a dot on the API button + a dismissable banner. The full
        // changelog and 一键更新 live in the API settings page. Fully guarded:
        // any failure (old backend, offline, unconfigured repo) stays silent.
        function dismissUpdateBanner() {
            const b = document.getElementById('update-banner');
            if (b) b.classList.remove('show');
        }
        function goUpdate() {
            dismissUpdateBanner();
            const apiFrame = document.getElementById('frame-api-settings');
            if (apiFrame && !apiFrame.classList.contains('active')) toggleApiSettings();
        }
        async function checkAppUpdate() {
            try {
                if (sessionStorage.getItem('mc_update_checked') === '1') return;
                const r = await fetch('/api/check-update');
                if (!r.ok) return; // 404 (no release) / unconfigured / rate-limited → silent
                const data = await r.json();
                sessionStorage.setItem('mc_update_checked', '1');
                if (!data.has_update) return;
                const badge = document.getElementById('update-badge');
                if (badge) badge.classList.add('show');
                const ver = document.getElementById('update-banner-ver');
                if (ver) ver.textContent = 'v' + data.latest;
                const banner = document.getElementById('update-banner');
                if (banner) banner.classList.add('show');
            } catch (e) { /* stay silent — update hint is best-effort */ }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (window.StudioI18n) window.StudioI18n.apply();
            broadcastLanguage();
            checkAppUpdate();
        });

        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => {
                syncLanguageToFrame(f);
            });
        });
    </script>
</body>

</html>
